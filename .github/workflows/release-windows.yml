name: Build Windows desktop app

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: windows-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: webapp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install dependencies (with electron)
        run: npm ci --include=optional

      - name: Build webapp and package
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload portable exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: legal-dream-team-portable
          path: webapp/release/Legal-Dream-Team-*-portable.exe
          if-no-files-found: warn

      - name: Upload installer exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: legal-dream-team-setup
          path: webapp/release/Legal-Dream-Team-*-setup.exe
          if-no-files-found: warn

      - name: Tag and release
        id: release
        shell: bash
        run: |
          set -e
          VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA="${GITHUB_SHA:0:7}"
          TAG="v${VERSION}-${SHORT_SHA}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release with the exes
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: Legal Dream Team ${{ steps.release.outputs.version }} (${{ github.sha }})
          body: |
            Automated build of the Legal Dream Team Windows desktop app.

            Pick one:
            - `Legal-Dream-Team-${{ steps.release.outputs.version }}-portable.exe`. Single file, no install. Double click to run.
            - `Legal-Dream-Team-${{ steps.release.outputs.version }}-setup.exe`. NSIS installer with Start Menu and desktop shortcuts.

            Built from commit ${{ github.sha }}.
          files: |
            webapp/release/Legal-Dream-Team-*-portable.exe
            webapp/release/Legal-Dream-Team-*-setup.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
